<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    
    <!-- Soft Glow / Drop Shadow for Math Symbols -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25" />
    </feDropShadow>
    
    <!-- Semi-transparent White Inner Border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Squircle-like smooth rounded rectangle base -->
  <rect x="10" y="10" width="492" height="492" rx="110" fill="url(#bgGrad)" />
  <rect x="10" y="10" width="492" height="492" rx="110" fill="none" stroke="url(#borderGrad)" stroke-width="5" />

  <!-- Math Symbols Group with shadow -->
  <g filter="url(#shadow)" stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Square Root Symbol: √ -->
    <path d="M 110 260 L 145 260 L 185 370 L 240 140 L 400 140" stroke-width="24" />
    
    <!-- Greek Letter Pi: π inside root -->
    <!-- Top Bar -->
    <path d="M 265 210 L 375 210" stroke-width="19" />
    <!-- Left Leg -->
    <path d="M 295 210 L 295 300 C 295 320, 275 325, 275 325" stroke-width="19" />
    <!-- Right Leg -->
    <path d="M 345 210 L 345 305 C 345 320, 365 325, 365 325" stroke-width="19" />
  </g>
</svg>
